# This workflow will open a PR in https://github.com/instill-ai/instill-core
# updating the MGMT_BACKEND_VERSION in the .env file with the short commit hash.

name: Update Instill Core Version

on:
  push:
    branches:
      - main
      - huitang/ins-8272 # TODO: remove this branch

permissions:
  contents: read

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout instill-core repository
        uses: actions/checkout@v4
        with:
          repository: instill-ai/instill-core
          token: ${{ secrets.botGitHubToken }}

      - name: Get current version from instill-core
        id: current-version
        run: |
          current_version=$(grep "MGMT_BACKEND_VERSION=" .env | cut -d'=' -f2)
          # Add 'v' prefix if current_version follows semantic versioning pattern (x.y.z)
          if [[ $current_version =~ ^[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            current_version="v$current_version"
          fi
          echo "current_version=$current_version" >> $GITHUB_OUTPUT
          echo "Current MGMT_BACKEND_VERSION in instill-core: $current_version"

      - name: Checkout mgmt-backend
        uses: actions/checkout@v4
        with:
          repository: instill-ai/mgmt-backend
          token: ${{ secrets.botGitHubToken }}
          fetch-depth: 0

      - name: Get short commit hash
        id: commit-hash
        run: echo "short_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit messages between versions
        id: commit-messages
        run: |
          current_version="${{ steps.current-version.outputs.current_version }}"
          new_version="${{ steps.commit-hash.outputs.short_hash }}"

          # Get full commit hashes
          if [ -n "$current_version" ] && git rev-parse --verify "$current_version" >/dev/null 2>&1; then
            current_full_hash=$(git rev-parse "$current_version")
            new_full_hash=$(git rev-parse "$new_version")

            # Get commit messages between the two versions
            commit_messages=$(git log --pretty=format:"- %s" "$current_full_hash..$new_full_hash")

            # Handle case where there are no new commits
            if [ -z "$commit_messages" ]; then
              commit_messages="No new commits since last update"
            fi
          else
            commit_messages="- Initial version update"
          fi

          # Use EOF delimiter to handle multiline output
          {
            echo "commit_messages<<EOF"
            echo "$commit_messages"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Checkout instill-core repository
        uses: actions/checkout@v4
        with:
          repository: instill-ai/instill-core
          token: ${{ secrets.botGitHubToken }}


      - name: Update MGMT_BACKEND_VERSION
        run: |
          # Update the MGMT_BACKEND_VERSION in .env file
          sed -i "s/MGMT_BACKEND_VERSION=.*/MGMT_BACKEND_VERSION=${{ steps.commit-hash.outputs.short_hash }}/" .env

          # Verify the change
          echo "Updated MGMT_BACKEND_VERSION to: ${{ steps.commit-hash.outputs.short_hash }}"
          grep "MGMT_BACKEND_VERSION=" .env

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.botGitHubToken }}
          commit-message: "chore(env): update MGMT_BACKEND_VERSION to ${{ steps.commit-hash.outputs.short_hash }}"
          title: "chore(env): update MGMT_BACKEND_VERSION to ${{ steps.commit-hash.outputs.short_hash }}"
          body: |
            Because
            - The version of the mgmt-backend service is not updated in the instill-core repository.

            This commit
            - updates the `MGMT_BACKEND_VERSION` in the `.env` file from `${{ steps.current-version.outputs.current_version }}` to `${{ steps.commit-hash.outputs.short_hash }}`.

            ## Changes in mgmt-backend
            ${{ steps.commit-messages.outputs.commit_messages }}

          branch: chore/update-mgmt-backend-version
          base: huitang/ins-8272 # TODO: change this branch to main
          draft: false
          delete-branch: true
